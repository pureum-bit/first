<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- 이거 없으면 모바일 깨짐(모바일 최적화)이거 없으면 모바일 깨짐 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style5-2gpt.css" />
    <!-- 웨딩 느낌 serif + 한글 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <title>Wedding Party Invitation</title>
  </head>
  <body>
    <!-- 꽃잎이 생성될 영역 -->
    <div id="petal-container"></div>

    <!-- 배경 음악 -->
    <audio id="bgm" loop muted>
      <source src="./assets2/wedding.mp3" type="audio/mpeg" />
    </audio>

    <!-- 음악 버튼 -->
    <button id="musicBtn">
      <!-- 기본: OFF 아이콘 -->
      <svg id="icon-off" viewBox="0 0 24 24" width="22" height="22">
        <path d="M3 9v6h4l5 4V5L7 9H3z" fill="currentColor" />
        <line
          x1="16"
          y1="8"
          x2="21"
          y2="16"
          stroke="currentColor"
          stroke-width="2"
        />
        <line
          x1="21"
          y1="8"
          x2="16"
          y2="16"
          stroke="currentColor"
          stroke-width="2"
        />
      </svg>

      <!-- 기본: ON 아이콘 (숨김) -->
      <svg
        id="icon-on"
        viewBox="0 0 24 24"
        width="22"
        height="22"
        style="display: none"
      >
        <path d="M3 9v6h4l5 4V5L7 9H3z" fill="currentColor" />
        <path
          d="M16 8c1.5 2 1.5 6 0 8"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
        />
        <path
          d="M19 6c3 4 3 8 0 12"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
        />
      </svg>
    </button>
    <!-- 상단 아이콘 -->
    <button id="topBtn">↑</button>
    <header>
      <h1>
        <img src="./assets2/hero_text.png" alt="Welcome to Our Wedding Party" />
      </h1>
      <nav>
        <ul>
          <li><a href="#msgArea">Message</a></li>
          <li><a href="#dateArea">Date</a></li>
          <li><a href="#formArea">Form</a></li>
        </ul>
      </nav>
      <p>Scroll<br /><img src="./assets2/bar.png" alt="" /></p>
    </header>
    <main>
      <section id="msgArea">
        <h2>Message</h2>
        <p>
          금번 카피조우와 카피코는<br />
          웨딩 파티를 개최하게 되었습니다.<br />
        </p>
        <p>
          바쁘시겠지만 부디 오셔서 축하해주시면 더없이 기쁘겠습니다.<br />
          참석 여부는 페이지 하단 폼을 통해 알려주실 수 있습니다.<br />
        </p>
        <p><img src="./assets2/message_img.png" alt="카피조우와 카피코" /></p>
      </section>
      <section id="dateArea">
        <h2>Save the Date</h2>
        <p><img src="./assets2/date_img.jpg" alt="" /></p>
        <p>
          3023.8.8 Thu<br />
          Start 18:30-
        </p>
        <section>
          <h3>Access</h3>
          <p>
            나뭇잎길 1-2-3<br />
            Ristorante Capita에서<br />
            02-XXXX-XXXX<br />
          </p>
        </section>
      </section>
      <!-- RSVP 영역 -->
      <section id="formArea">
        <h2>RSVP</h2>

        <form>
          <!-- 참석 여부 -->
          <div class="form-group">
            <label>참석 여부</label>
            <select>
              <option>참석</option>
              <option>불참</option>
            </select>
          </div>

          <!-- 이름 -->
          <div class="form-group">
            <label>성함</label>
            <input type="text" placeholder="이름을 입력해주세요" />
          </div>

          <!-- 이메일 -->
          <div class="form-group">
            <label>이메일</label>
            <input type="email" placeholder="example@email.com" />
          </div>

          <!-- 유형 (radio 버튼) -->
          <div class="form-group">
            <label>유형</label>

            <div class="radio-group">
              <!-- input 먼저, 바로 뒤에 label -->
              <input type="radio" id="type1" name="type" />
              <label for="type1">초식 동물</label>

              <input type="radio" id="type2" name="type" />
              <label for="type2">육식 동물</label>

              <input type="radio" id="type3" name="type" />
              <label for="type3">인간</label>
            </div>
          </div>

          <!-- 알레르기 (checkbox) -->
          <div class="form-group">
            <label>알레르기</label>

            <div class="checkbox-group">
              <input type="checkbox" id="egg" />
              <label for="egg">달걀</label>

              <input type="checkbox" id="milk" />
              <label for="milk">우유</label>

              <input type="checkbox" id="wheat" />
              <label for="wheat">밀</label>

              <input type="checkbox" id="soy" />
              <label for="soy">대두</label>
            </div>
          </div>

          <!-- 메시지 -->
          <div class="form-group">
            <label>메시지</label>
            <textarea rows="4"></textarea>
          </div>

          <button type="submit">Send</button>
        </form>
      </section>
    </main>
    <footer>
      <p><small>© Capyzou & Capyco</small></p>
    </footer>
    <script src="./js/csstest5-2gpt.js"></script>
  </body>
</html>
